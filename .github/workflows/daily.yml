name: Daily arXiv Digest

on:
  schedule:
    - cron: "30 0 * * 2-6"   # 00:30 UTC Tue–Sat — just after arXiv's midnight UTC cutoff
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-MiniLM
          restore-keys: ${{ runner.os }}-hf-

      - name: Run pipeline
        run: python pipeline/main.py
        env:
          NOTIFY_GMAIL_USER:     ${{ secrets.NOTIFY_GMAIL_USER }}
          NOTIFY_GMAIL_APP_PASS: ${{ secrets.NOTIFY_GMAIL_APP_PASS }}
          NOTIFY_TO:             ${{ secrets.NOTIFY_TO }}

      # ── Commit data back to main ──────────────────────────────────────────
      # Persists data/papers/*.json and data/available_dates.json across runs.
      # index.html and date.html are static and committed once — no rebuild needed.
      - name: Commit data to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers/*.json data/available_dates.json
          git diff --cached --quiet || git commit -m "chore: papers $(date -u +'%Y-%m-%d') [skip ci]"
          git push origin main

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      # Copies the full site (static shell + data + shared assets) to gh-pages.
      - name: Deploy to gh-pages
        run: |
          mkdir /tmp/site
          cp index.html  /tmp/site/
          cp date.html   /tmp/site/
          cp -r static/  /tmp/site/static/
          cp -r data/    /tmp/site/data/

          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r /tmp/site/. .

          git add index.html date.html static/ data/
          git diff --cached --quiet || git commit -m "deploy: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
