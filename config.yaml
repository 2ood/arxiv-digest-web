topics:
  - name: Artificial Consciousness
    enabled: true
    terms:
      - artificial consciousness
      - machine consciousness
      - conscious AI
      - conscious agent
      - sentience
      - phenomenal experience
      - qualia
      - machine self-awareness
      - subjective experience
      - integrated information theory
      - IIT
      - global workspace theory
      - GWT
      - higher-order theory
      - cognitive architecture
      - inner experience
    description: "Papers about machine consciousness, subjective experience, and theories of mind applied to AI systems"

  - name: Test-Time Learning
    enabled: true
    terms:
      - test-time learning
      - test-time training
      - test-time compute
      - test-time adaptation
      - inference-time compute
      - inference-time scaling
      - chain-of-thought reasoning
      - chain of thought
      - self-consistency decoding
      - tree of thought
      - best-of-N sampling
      - majority voting
      - slow thinking
      - extended thinking
      - reasoning model
      - Monte Carlo tree search
      - MCTS
      - search at inference
    description: "Papers about leveraging more computation at inference time to improve model performance, including reasoning models and search-based methods"

  - name: Symbolic AI
    enabled: true
    terms:
      - neurosymbolic
      - neuro-symbolic
      - symbolic reasoning
      - knowledge graph
      - formal verification
      - theorem proving
      - automated reasoning
      - first-order logic
      - constraint satisfaction
      - program synthesis
      - knowledge representation
      - inductive logic programming
      - symbolic regression
      - hybrid reasoning
    description: "Papers combining neural networks with symbolic reasoning, logic, or structured knowledge representations"

# arXiv categories to fetch from
categories:
  - cs.AI
  - cs.LG
  - cs.CL

# Max papers to fetch per run
max_results: 2000

# Semantic similarity threshold (0.0–1.0, lower = more results)
embedding_threshold: 0.35

# Optional: included as a link at the bottom of notification emails
# site_url: "https://yourusername.github.io/arxiv-digest"